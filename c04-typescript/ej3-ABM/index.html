<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3 - ABM de Libros</title>
</head>
<body>
    <h1>ABM de Libros</h1>

    <div style="background-color: #f0f0f0; padding: 15px; margin-bottom: 20px;">
        <h2>Agregar Nuevo Libro</h2>
        
        <div id="errorForm" style="color: red; font-weight: bold; margin-bottom: 10px;"></div>
        
        <input type="text" id="in-titulo" placeholder="Título">
        <input type="text" id="in-autor" placeholder="Autor">
        <input type="number" id="in-precio" placeholder="Precio" min="1">
        <label><input type="checkbox" id="in-disponible" checked> Disponible</label>
        
        <button id="btn-agregar">Agregar Libro</button>
    </div>

    <div>
        <label for="input-autor">Buscar por autor:</label>
        <input type="text" id="input-autor" placeholder="Ej: Tolkien">
        <button id="btn-filtrar">Filtrar</button>
        <button id="btn-disponibles">Solo disponibles</button>
        <button id="btn-todos">Ver todos</button>
    </div>
    <hr>

    <div id="estadisticas"></div>
    <div id="contenedor-libros"></div>

    <script src="app.js"></script>
</body>
</html>
