<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">        <title>Ejercicio de Libreria</title>
        <title>Ejercicio de Libreria</title>
        
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

        <link href="css/styles.css" rel="stylesheet">
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="index.html">
                    Libreria
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="#navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="#navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="catalogo.html">Catalogo</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="contacto.html">Contacto</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <main class="container my-5">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6">

                    <h1 class="text-center mb-4">Contacto</h1>
                    <p class="text-center text-muted mb-4">Dejanos tu mensaje</p>

                    <form>
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Correo Electronico <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="email" placeholder="ejemplo@gmail.com" required>
                        </div>

                        <div class="mb-3">
                            <label for="asunto" class="form-label">Asunto <span class="text-danger">*</span></label>
                            <select class="form-select" id="asunto" required>
                                <option value="" selected disabled>Selecciona una Opcion.</option>
                                <option value="consulta">Consulta</option>
                                <option value="reclamo">Reclamo</option>
                                <option value="sugerencia">Sugerencia</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="mensaje" class="form-label">Mensaje <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="mensaje" rows="5" placeholder="Escribe el mensaje acá..." required></textarea>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">Enviar Mensaje</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/data.js"></script>
    </body>
</html>
