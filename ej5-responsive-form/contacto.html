    <div class="contenedor-cv">
    <h1>Contacto</h1>
    <h2>Contactame: </h2>

    <form action="#" method="get" class="formulario-contacto">
            
            <div class="campo">
                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" name="nombre" required minlength="3" placeholder="Tu nombre">
            </div>

            <div class="campo">
                <label for="correo">Correo electrónico:</label>
                <input type="email" id="correo" name="correo" required placeholder="tu@email.com">
            </div>

            <div class="campo">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" rows="5" required minlength="10" placeholder="Escribe tu mensaje aquí..."></textarea>
            </div>

            <button type="submit" class="boton-enviar">Enviar Mensaje</button>
        </form>

    </div>
</body>
</html>
